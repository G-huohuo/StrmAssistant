name: Build Plugin

on:
  workflow_dispatch:  # 仅允许手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # 只获取最新提交，加快克隆速度

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.x'

      # 缓存 NuGet 包，提升构建速度（Windows 推荐用 NUGET_PACKAGES）
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore StrmAssistant/StrmAssistant.csproj

      - name: Build the project
        run: dotnet build StrmAssistant/StrmAssistant.csproj --no-restore --configuration Release -p:UseSharedCompilation=false

      # 可选：列出输出，方便你在日志里确认产物路径
      - name: List build output
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Force "StrmAssistant\bin\Release" | Select-Object FullName

      - name: Upload artifact (build output)
        uses: actions/upload-artifact@v4
        with:
          name: StrmAssistantLite-${{ github.run_number }}
          path: StrmAssistant/bin/Release/**
          compression-level: 0  # DLL 已经是二进制，不需要压缩
          retention-days: 30
